apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: plataforma-agentes
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: plataforma-agentes/frontend:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - cp /html/index.html /usr/share/nginx/html/index.html && cp /config/config.js /usr/share/nginx/html/config.js && nginx -g 'daemon off;'
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-config
              mountPath: /config
            - name: frontend-html
              mountPath: /html
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: frontend-config
          configMap:
            name: frontend-config
        - name: frontend-html
          configMap:
            name: frontend-html
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: plataforma-agentes
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30000
---
apiVersion: apps/v1
