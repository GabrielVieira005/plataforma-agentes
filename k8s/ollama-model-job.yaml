apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-llama32
  namespace: plataforma-agentes
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: ollama-pull-llama32
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ollama-pull
          image: ollama/ollama:latest
          env:
            - name: OLLAMA_HOST
              value: http://ollama:11434
          command:
            - /bin/sh
            - -c
            - |
              until ollama list >/dev/null 2>&1; do
                echo "waiting for ollama service..."
                sleep 5
              done
              ollama pull llama3.2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 1Gi
