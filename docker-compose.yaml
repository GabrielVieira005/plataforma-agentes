services:

  # ── Infraestrutura ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: memory
    ports: ["5432:5432"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"   # UI em http://localhost:15672

  chromadb:
    image: chromadb/chroma:0.5.23
    ports: ["8001:8000"]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC

  # ── Microsserviços ──────────────────────────────────────────────
  name-server:
    build: ./name-server
    ports: ["8000:8000"]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: local
      SERVICE_NAME: name-server
    depends_on: [jaeger]

  llm-gateway:
    build: ./llm-gateway
    ports: ["8002:8000"]
    environment:
      OLLAMA_URL: http://ollama:11434
      NAME_SERVER_URL: http://name-server:8000
      SERVICE_URL: http://llm-gateway:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: local
      SERVICE_NAME: llm-gateway
    depends_on: [ollama, name-server, jaeger]

  memory-service:
    build: ./memory-service
    ports: ["8003:8000"]
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://agent:agent@postgres/memory
      NAME_SERVER_URL: http://name-server:8000
      SERVICE_URL: http://memory-service:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: local
      SERVICE_NAME: memory-service
    depends_on: [redis, postgres, name-server, jaeger]

  retrieval-service:
    build: ./retrieval-service
    ports: ["8004:8000"]
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      NAME_SERVER_URL: http://name-server:8000
      SERVICE_URL: http://retrieval-service:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: local
      SERVICE_NAME: retrieval-service
      ANONYMIZED_TELEMETRY: "False"
    depends_on: [chromadb, rabbitmq, name-server, jaeger]

  tool-registry:
    build: ./tool-registry
    ports: ["8005:8000"]
    environment:
      NAME_SERVER_URL: http://name-server:8000
      SERVICE_URL: http://tool-registry:8000
      RETRIEVAL_SERVICE_URL: http://retrieval-service:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: local
      SERVICE_NAME: tool-registry
    depends_on: [name-server, jaeger]

  agent-service:
    build: ./agent-service
    ports: ["8006:8000"]
    environment:
      LLM_GATEWAY_URL: http://llm-gateway:8000
      MEMORY_SERVICE_URL: http://memory-service:8000
      RETRIEVAL_SERVICE_URL: http://retrieval-service:8000
      TOOL_REGISTRY_URL: http://tool-registry:8000
      NAME_SERVER_URL: http://name-server:8000
      SERVICE_URL: http://agent-service:8000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: local
      SERVICE_NAME: agent-service
    depends_on: [llm-gateway, memory-service, tool-registry, rabbitmq, jaeger]

  api-gateway:
    build: ./api-gateway
    ports: ["80:8000"]
    environment:
      AGENT_SERVICE_URL: http://agent-service:8000
      RETRIEVAL_SERVICE_URL: http://retrieval-service:8000
      NAME_SERVER_URL: http://name-server:8000
      LLM_GATEWAY_URL: http://llm-gateway:8000
      MEMORY_SERVICE_URL: http://memory-service:8000
      TOOL_REGISTRY_URL: http://tool-registry:8000
      SERVICE_URL: http://api-gateway:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_ENVIRONMENT: local
      SERVICE_NAME: api-gateway
    depends_on: [agent-service, name-server, jaeger]

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [api-gateway]

volumes:
  ollama_data:
