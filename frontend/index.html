<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nubo Agents</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg:        #0d0f12;
      --surface:   #13161b;
      --border:    #1f2430;
      --border2:   #2a3040;
      --accent:    #4f8ef7;
      --accent2:   #7c3aed;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --muted2:    #94a3b8;
      --user-bg:   #1a2035;
      --agent-bg:  #13161b;
      --tool-bg:   #1a1a2e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr 280px;
      grid-template-rows: 52px 1fr;
      overflow: hidden;
    }

    /* ── Topbar ─────────────────────────────────────────── */
    .topbar {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .logo span { color: var(--muted2); }

    .topbar-center {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 12px;
      color: var(--muted2);
      font-family: 'JetBrains Mono', monospace;
    }

    .model-badge {
      margin-left: auto;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      background: var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border2);
    }

    /* ── Sidebar esquerda ────────────────────────────────── */
    .sidebar-left {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 14px 16px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }

    .session-item {
      padding: 10px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .session-item:hover { background: var(--border); }
    .session-item.active { background: #1c2540; border: 1px solid #2a3a6e; }

    .session-name {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace;
    }

    .new-session-btn {
      margin: 10px 10px;
      padding: 9px;
      background: transparent;
      border: 1px dashed var(--border2);
      border-radius: 6px;
      color: var(--muted2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .new-session-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #0d1929;
    }

    /* ── Chat principal ──────────────────────────────────── */
    .chat-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }

    .chat-session-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted2);
    }

    .chat-iter-badge {
      font-size: 11px;
      background: var(--tool-bg);
      border: 1px solid var(--border2);
      color: var(--muted2);
      padding: 2px 8px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* Mensagens */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .avatar.agent { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .avatar.user  { background: var(--border2); }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #2a3a6e;
      border-radius: 12px 4px 12px 12px;
      color: var(--text);
    }

    .msg.agent .bubble {
      background: var(--agent-bg);
      border: 1px solid var(--border);
      border-radius: 4px 12px 12px 12px;
      color: var(--text);
    }

    .msg.tool .bubble {
      background: var(--tool-bg);
      border: 1px solid #2d2060;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #a78bfa;
      max-width: 80%;
    }

    .tool-label {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: #7c3aed;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .iterations-tag {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 6px;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 14px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    #messageInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #messageInput::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 7px;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #3b7de8; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: var(--border2); cursor: not-allowed; }

    .send-btn svg { width: 16px; height: 16px; fill: white; }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      display: flex;
      gap: 16px;
    }

    .input-hint kbd {
      font-family: 'JetBrains Mono', monospace;
      background: var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
    }

    /* ── Sidebar direita ─────────────────────────────────── */
    .sidebar-right {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: #0d1929;
    }

    .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-content.active { display: flex; }

    /* Serviços */
    .services-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .service-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .service-card:hover { border-color: var(--border2); }

    .service-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .service-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .service-indicator {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    .service-indicator.ok { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .service-indicator.err { background: var(--red); box-shadow: 0 0 5px var(--red); }
    .service-indicator.loading { background: var(--yellow); animation: pulse 1s infinite; }

    .service-url {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 4px;
    }

    .service-detail {
      font-size: 11px;
      color: var(--muted2);
      margin-top: 4px;
    }

    .refresh-btn {
      margin: 0 12px 12px;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--muted2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* RAG */
    .rag-panel {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .rag-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    textarea.rag-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 8px 10px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      line-height: 1.5;
    }

    textarea.rag-input:focus { border-color: var(--accent); }

    .rag-btn {
      padding: 8px 12px;
      background: var(--accent2);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .rag-btn:hover { background: #6d28d9; }
    .rag-btn.secondary {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted2);
    }
    .rag-btn.secondary:hover { border-color: var(--accent2); color: var(--accent2); background: transparent; }

    .rag-results {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rag-result-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--muted2);
      line-height: 1.5;
    }

    .rag-result-item strong {
      color: var(--accent2);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 4px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }

    .empty-icon {
      width: 48px; height: 48px;
      background: var(--border);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .empty-title { font-size: 15px; color: var(--muted2); font-weight: 500; }
    .empty-sub   { font-size: 12px; text-align: center; max-width: 200px; line-height: 1.5; }

    /* Scrollbar geral */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── Topbar ── -->
<header class="topbar">
  <div class="logo">nubo<span>/</span>agents</div>
  <div class="topbar-center">
    <div class="status-dot" id="globalStatus"></div>
    <span class="status-text" id="globalStatusText">verificando serviços...</span>
  </div>
  <div class="model-badge" id="modelBadge">llama3.2</div>
</header>

<!-- ── Sidebar esquerda ── -->
<aside class="sidebar-left">
  <div class="sidebar-section">Sessões</div>
  <div class="session-list" id="sessionList"></div>
  <button class="new-session-btn" onclick="newSession()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Nova sessão
  </button>
</aside>

<!-- ── Chat ── -->
<main class="chat-area">
  <div class="chat-header">
    <span class="chat-session-id" id="chatSessionId">nenhuma sessão selecionada</span>
    <span class="chat-iter-badge" id="iterBadge" style="display:none"></span>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🤖</div>
      <div class="empty-title">Nenhuma sessão ativa</div>
      <div class="empty-sub">Crie uma nova sessão ou selecione uma existente para começar.</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="messageInput" placeholder="Envie uma mensagem..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="input-hint">
      <span><kbd>Enter</kbd> enviar</span>
      <span><kbd>Shift+Enter</kbd> nova linha</span>
    </div>
  </div>
</main>

<!-- ── Sidebar direita ── -->
<aside class="sidebar-right">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('services')">Serviços</div>
    <div class="tab" onclick="switchTab('rag')">RAG</div>
  </div>

  <!-- Tab: Serviços -->
  <div class="tab-content active" id="tab-services">
    <div class="services-list" id="servicesList"></div>
    <button class="refresh-btn" onclick="checkServices()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Verificar serviços
    </button>
  </div>

  <!-- Tab: RAG -->
  <div class="tab-content" id="tab-rag">
    <div class="rag-panel">
      <div>
        <div class="rag-label">Ingerir documento</div>
        <textarea class="rag-input" id="ragIngestText" placeholder="Cole o conteúdo do documento aqui..."></textarea>
      </div>
      <button class="rag-btn" onclick="ingestDocument()">Indexar documento</button>

      <div style="border-top: 1px solid var(--border); padding-top: 10px;">
        <div class="rag-label">Busca semântica</div>
        <textarea class="rag-input" id="ragQueryText" placeholder="O que você quer buscar?" style="min-height:50px"></textarea>
        <button class="rag-btn secondary" style="margin-top:6px; width:100%" onclick="queryDocuments()">Buscar</button>
      </div>

      <div class="rag-results" id="ragResults"></div>
    </div>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script>
  // ── Config ──────────────────────────────────────────────────────
  const AGENT_URL     = 'http://localhost:8006';
  const MEMORY_URL    = 'http://localhost:8003';
  const RETRIEVAL_URL = 'http://localhost:8004';
  const TOOLS_URL     = 'http://localhost:8005';
  const GATEWAY_URL   = 'http://localhost:8002';
  const NAMESERVER_URL= 'http://localhost:8000';

  const SERVICES = [
    { name: 'agent-service',    url: AGENT_URL,      port: 8006 },
    { name: 'llm-gateway',      url: GATEWAY_URL,    port: 8002 },
    { name: 'memory-service',   url: MEMORY_URL,     port: 8003 },
    { name: 'retrieval-service',url: RETRIEVAL_URL,  port: 8004 },
    { name: 'tool-registry',    url: TOOLS_URL,      port: 8005 },
    { name: 'name-server',      url: NAMESERVER_URL, port: 8000 },
  ];

  // ── Estado ──────────────────────────────────────────────────────
  let currentSession = null;
  let sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
  let isLoading = false;

  // ── Init ────────────────────────────────────────────────────────
  renderSessionList();
  checkServices();
  setInterval(checkServices, 30000);

  // ── Sessões ─────────────────────────────────────────────────────
  function newSession() {
    const id = 'session-' + Date.now();
    const session = { id, name: 'Sessão ' + (sessions.length + 1), messages: [], createdAt: Date.now() };
    sessions.unshift(session);
    saveSessions();
    renderSessionList();
    selectSession(id);
  }

  function selectSession(id) {
    currentSession = sessions.find(s => s.id === id);
    renderSessionList();
    renderMessages();
    document.getElementById('chatSessionId').textContent = currentSession.id;
    document.getElementById('iterBadge').style.display = 'none';
    document.getElementById('messageInput').focus();
  }

  function saveSessions() {
    localStorage.setItem('sessions', JSON.stringify(sessions));
  }

  function renderSessionList() {
    const list = document.getElementById('sessionList');
    if (sessions.length === 0) {
      list.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--muted);text-align:center">Nenhuma sessão ainda</div>';
      return;
    }
    list.innerHTML = sessions.map(s => `
      <div class="session-item ${currentSession?.id === s.id ? 'active' : ''}" onclick="selectSession('${s.id}')">
        <div class="session-name">${s.name}</div>
        <div class="session-meta">${s.messages.length} msgs · ${s.id.slice(-6)}</div>
      </div>
    `).join('');
  }

  // ── Mensagens ────────────────────────────────────────────────────
function renderMessages() {
  const container = document.getElementById('messages');

  if (!currentSession) {
    container.innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🤖</div>
        <div class="empty-title">Nenhuma sessão ativa</div>
        <div class="empty-sub">Crie uma nova sessão ou selecione uma existente para começar.</div>
      </div>`;
    return;
  }

  const msgs = currentSession.messages;
  if (msgs.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-title">Sessão vazia</div>
        <div class="empty-sub">Envie uma mensagem para começar a conversa.</div>
      </div>`;
    return;
  }

  container.innerHTML = msgs.map(m => renderMessage(m)).join('');
  container.scrollTop = container.scrollHeight;
}

  function renderMessage(m) {
    if (m.role === 'user') {
      return `
        <div class="msg user">
          <div class="avatar user">👤</div>
          <div class="bubble">${escapeHtml(m.content)}</div>
        </div>`;
    }
    if (m.role === 'tool') {
      return `
        <div class="msg tool">
          <div class="bubble">
            <div class="tool-label">⚡ ferramenta invocada</div>
            ${escapeHtml(m.content)}
          </div>
        </div>`;
    }
    return `
      <div class="msg agent">
        <div class="avatar agent">🤖</div>
        <div class="bubble">
          ${escapeHtml(m.content)}
          ${m.iterations ? `<div class="iterations-tag">${m.iterations} iteração(ões)</div>` : ''}
        </div>
      </div>`;
  }

  function addMessage(role, content, extra = {}) {
    if (!currentSession) return;
    currentSession.messages.push({ role, content, ...extra, ts: Date.now() });
    saveSessions();
    renderSessionList();
    renderMessages();
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.id = 'typing-indicator';
    div.className = 'msg agent';
    div.innerHTML = `
      <div class="avatar agent">🤖</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  // ── Envio ────────────────────────────────────────────────────────
  async function sendMessage() {
    if (!currentSession || isLoading) return;
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    addMessage('user', text);
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      const res = await fetch(`${AGENT_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: currentSession.id, message: text }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addMessage('agent', err.detail || 'Erro ao processar a mensagem.');
      } else {
        const data = await res.json();
        addMessage('agent', data.response, { iterations: data.iterations });

        const badge = document.getElementById('iterBadge');
        badge.textContent = `${data.iterations} iter`;
        badge.style.display = 'inline';
      }
    } catch (e) {
      removeTyping();
      addMessage('agent', '⚠️ Não foi possível conectar ao agent-service. Verifique se está rodando na porta 8006.');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('messageInput').focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── Serviços ─────────────────────────────────────────────────────
  async function checkServices() {
    const list = document.getElementById('servicesList');
    list.innerHTML = SERVICES.map(s => `
      <div class="service-card" id="svc-${s.name}">
        <div class="service-header">
          <span class="service-name">${s.name}</span>
          <div class="service-indicator loading" id="dot-${s.name}"></div>
        </div>
        <div class="service-url">:${s.port}/health</div>
        <div class="service-detail" id="detail-${s.name}">verificando...</div>
      </div>
    `).join('');

    let allOk = true;

    await Promise.all(SERVICES.map(async s => {
      try {
        const res = await fetch(`${s.url}/health`, { signal: AbortSignal.timeout(3000) });
        const data = await res.json();
        const ok = res.ok;
        if (!ok) allOk = false;

        document.getElementById(`dot-${s.name}`).className = `service-indicator ${ok ? 'ok' : 'err'}`;
        document.getElementById(`detail-${s.name}`).textContent =
          ok ? (data.status || 'online') : 'erro';
      } catch {
        allOk = false;
        document.getElementById(`dot-${s.name}`).className = 'service-indicator err';
        document.getElementById(`detail-${s.name}`).textContent = 'offline';
      }
    }));

    const dot = document.getElementById('globalStatus');
    const txt = document.getElementById('globalStatusText');
    dot.style.background = allOk ? 'var(--green)' : 'var(--yellow)';
    dot.style.boxShadow = allOk ? '0 0 6px var(--green)' : '0 0 6px var(--yellow)';
    txt.textContent = allOk ? 'todos os serviços online' : 'alguns serviços offline';
  }

  // ── RAG ──────────────────────────────────────────────────────────
  async function ingestDocument() {
    const text = document.getElementById('ragIngestText').value.trim();
    if (!text) { showToast('Digite o conteúdo do documento.'); return; }

    try {
      const res = await fetch(`${RETRIEVAL_URL}/ingest/sync`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ documents: [{ content: text, metadata: { source: 'frontend' } }] }),
      });
      if (res.ok) {
        showToast('✓ Documento indexado com sucesso!');
        document.getElementById('ragIngestText').value = '';
      } else {
        showToast('Erro ao indexar documento.');
      }
    } catch {
      showToast('retrieval-service offline.');
    }
  }

  async function queryDocuments() {
    const query = document.getElementById('ragQueryText').value.trim();
    if (!query) { showToast('Digite uma query.'); return; }

    const results = document.getElementById('ragResults');
    results.innerHTML = '<div style="font-size:12px;color:var(--muted)">Buscando...</div>';

    try {
      const res = await fetch(`${RETRIEVAL_URL}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, n_results: 3 }),
      });
      const data = await res.json();
      const items = data.results || [];

      if (items.length === 0) {
        results.innerHTML = '<div style="font-size:12px;color:var(--muted)">Nenhum resultado encontrado.</div>';
        return;
      }

      results.innerHTML = items.map((item, i) => `
        <div class="rag-result-item">
          <strong>Resultado ${i + 1}</strong>
          ${escapeHtml(item.content.slice(0, 200))}${item.content.length > 200 ? '...' : ''}
        </div>
      `).join('');
    } catch {
      results.innerHTML = '<div style="font-size:12px;color:var(--red)">retrieval-service offline.</div>';
    }
  }

  // ── Tabs ─────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['services','rag'][i] === name);
    });
    document.querySelectorAll('.tab-content').forEach(c => {
      c.classList.toggle('active', c.id === `tab-${name}`);
    });
  }

  // ── Utils ────────────────────────────────────────────────────────
  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
